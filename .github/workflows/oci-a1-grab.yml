name: OCI A1 Instance Auto Grab

on:
  schedule:
    # 每3分钟运行一次
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  grab-a1-instance:
    runs-on: ubuntu-latest

    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
      OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
      OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
      OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
      OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

    steps:
      - name: Grab A1 Instance via REST API
        run: |
          set +e
          
          # 写入私钥
          mkdir -p ~/.oci
          echo "$OCI_CLI_KEY_CONTENT" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          
          # 安装 jq 和 openssl（通常已有）
          which jq >/dev/null 2>&1 || sudo apt-get install -y jq >/dev/null 2>&1
          
          # OCI API 签名函数
          oci_sign() {
            local method="$1" url_path="$2" body="$3"
            local date_now=$(date -u '+%a, %d %b %Y %H:%M:%S GMT')
            local host="iaas.${OCI_CLI_REGION}.oraclecloud.com"
            local sig_headers="date request-target host"
            local request_target="${method,,} ${url_path}"
            
            local sign_string="date: ${date_now}
          request-target: ${request_target}
          host: ${host}"
            
            if [ "$method" = "POST" ] || [ "$method" = "PUT" ]; then
              sign_string="${sign_string}
          content-length: ${#body}
          content-type: application/json"
              sig_headers="date request-target host content-length content-type"
            fi
            
            local signature=$(echo -n "$sign_string" | openssl dgst -sha256 -sign ~/.oci/key.pem | base64 -w0)
            
            echo "keyId=\"${OCI_CLI_TENANCY}/${OCI_CLI_USER}/${OCI_CLI_FINGERPRINT}\",algorithm=\"rsa-sha256\",headers=\"${sig_headers}\",signature=\"${signature}\""
          }
          
          # GET 请求
          oci_get() {
            local url_path="$1"
            local auth=$(oci_sign GET "$url_path")
            curl -s -w "\n%{http_code}" \
              -H "date: $(date -u '+%a, %d %b %Y %H:%M:%S GMT')" \
              -H "host: iaas.${OCI_CLI_REGION}.oraclecloud.com" \
              -H "authorization: Signature ${auth}" \
              "https://iaas.${OCI_CLI_REGION}.oraclecloud.com${url_path}"
          }
          
          # POST 请求
          oci_post() {
            local url_path="$1" body="$2"
            local auth=$(oci_sign POST "$url_path" "$body")
            curl -s -w "\n%{http_code}" \
              -X POST \
              -H "date: $(date -u '+%a, %d %b %Y %H:%M:%S GMT')" \
              -H "host: iaas.${OCI_CLI_REGION}.oraclecloud.com" \
              -H "content-type: application/json" \
              -H "content-length: ${#body}" \
              -H "authorization: Signature ${auth}" \
              -d "$body" \
              "https://iaas.${OCI_CLI_REGION}.oraclecloud.com${url_path}"
          }
          
          echo "=== 检查现有 A1 实例 ==="
          
          # 查询 RUNNING 和 STOPPED 的实例
          for STATE in RUNNING STOPPED; do
            RESPONSE=$(oci_get "/20160918/instances?compartmentId=${OCI_COMPARTMENT_ID}&availabilityDomain=${OCI_AVAILABILITY_DOMAIN}&lifecycleState=${STATE}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            
            if [ "$HTTP_CODE" = "200" ]; then
              INSTANCE_ID=$(echo "$BODY" | jq -r '.[] | select(.shape=="VM.Standard.A1.Flex") | .id' | head -1)
              if [ -n "$INSTANCE_ID" ]; then
                echo "发现 ${STATE} 状态的 A1 实例: $INSTANCE_ID"
                echo "已有实例，无需创建。"
                exit 0
              fi
            fi
          done
          
          echo "=== 无现有 A1 实例，尝试创建 ==="
          
          # 构建创建请求
          CREATE_BODY=$(cat << EOF
          {
            "compartmentId": "${OCI_COMPARTMENT_ID}",
            "availabilityDomain": "${OCI_AVAILABILITY_DOMAIN}",
            "shape": "VM.Standard.A1.Flex",
            "shapeConfig": {
              "ocpus": 1,
              "memoryInGBs": 6
            },
            "imageId": "${OCI_IMAGE_ID}",
            "subnetId": "${OCI_SUBNET_ID}",
            "assignPublicIp": true,
            "displayName": "A1-Auto-Grabbed",
            "metadata": {
              "ssh_authorized_keys": "${OCI_SSH_PUBLIC_KEY}"
            }
          }
          EOF
          )
          
          RESPONSE=$(oci_post "/20160918/instances" "$CREATE_BODY")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            INSTANCE_ID=$(echo "$BODY" | jq -r '.id')
            echo "🎉 实例创建成功! ID: $INSTANCE_ID"
            echo "配置: 1C / 6G"
          else
            ERROR_MSG=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null)
            if [ -n "$ERROR_MSG" ]; then
              echo "创建失败: $ERROR_MSG"
            else
              echo "创建失败 (HTTP $HTTP_CODE)"
            fi
          fi
